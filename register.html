<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | HybridCrypt</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #001f2d, #002f47);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .glass-card {
      background: rgba(0, 255, 168, 0.07);
      border: 2px solid rgba(0, 255, 168, 0.4);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0, 255, 168, 0.3);
      padding: 2.5rem 2rem;
      width: 380px;
      animation: fadeSlide 1s ease;
      position: relative;
    }

    @keyframes fadeSlide {
      0% {
        opacity: 0;
        transform: translateY(-30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-card h2 {
      font-family: 'Orbitron', sans-serif;
      color: #00ffa8;
      text-align: center;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 10px #00ffa8;
    }

    .glass-card input,
    .glass-card select {
      width: 100%;
      padding: 0.8rem 1rem;
      margin-bottom: 1.2rem;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #a0eaff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .glass-card input:focus,
    .glass-card select:focus {
      outline: 2px solid #00ffa8;
      box-shadow: 0 0 10px #00ffa8;
      background: rgba(255, 255, 255, 0.15);
    }

    .glass-card select {
      cursor: pointer;
    }

    .glass-card button {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 25px;
      background: linear-gradient(90deg, #00ffa8, #007f5f);
      color: #002f47;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 0 20px #00ffa8;
      transition: background 0.4s ease;
    }

    .glass-card button:hover {
      background: linear-gradient(90deg, #007f5f, #00ffa8);
    }

    .link-text {
      text-align: center;
      margin-top: 1rem;
      color: #a0eaff;
    }

    .link-text a {
      color: #00ffa8;
      text-decoration: none;
      font-weight: 500;
    }

    .link-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <form class="glass-card" method="POST" action="/register">
    <h2>Create Account</h2>

    <input type="text" name="username" placeholder="Username" required />
    <input type="email" name="email" placeholder="Email Address" required />
    <input type="password" name="password" placeholder="Password" required />
    <input type="password" name="confirm_password" placeholder="Confirm Password" required />

    <select name="role" required>
      <option value="" disabled selected>Select Role</option>
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>

    <button type="submit">Register</button>

    <div class="link-text">
      Already have an account? <a href="/login">Login</a>
    </div>
  </form>

</body>
</html>
