
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encryption Complete - HybridCrypt</title>

  <style>
    body {
      background: linear-gradient(135deg, #001f2d, #002f47);
      color: #d0f0fd;
      font-family: 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .box {
      background: rgba(0, 30, 50, 0.95);
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 0 20px #00ffa8;
      max-width: 500px;
      width: 90%;
    }

    h2 {
      color: #00ffa8;
      margin-bottom: 1rem;
    }

    p {
      margin: 0.6rem 0;
      font-size: 1rem;
    }

    strong {
      color: #ffffff;
    }

    .btn {
      display: inline-block;
      margin: 0.8rem 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #00ffa8;
      color: #002f47;
      font-weight: bold;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s ease;
      min-width: 160px;
    }

    .btn:hover {
      background: #007f5f;
      color: white;
    }

    .thank-you {
      margin-top: 2rem;
      font-style: italic;
      font-weight: bold;
      color: #00ffa8;
      font-size: 1.1rem;
    }

    @media (max-width: 400px) {
      .btn {
        display: block;
        margin: 0.8rem auto;
        width: 80%;
      }
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>✅ File Encrypted!</h2>

    <p>Original File: <strong>{{ filename }}</strong></p>
    <p>Encrypted File: <strong>{{ encrypted_filename }}</strong></p>

    <!-- ✅ Download Button -->
<a href="{{ url_for('download', filename=encrypted_filename) }}" class="btn">
    ⬇️ Download File
</a>
    <!-- ✅ Upload Again -->
    <a href="{{ url_for('upload') }}" class="btn">
      🔁 Upload Another
    </a>

    <!-- ❌ Removed visuals (causing error) -->

    <p class="thank-you">🙏 Thank you for using HybridCrypt!</p>
  </div>
</body>
</html>
