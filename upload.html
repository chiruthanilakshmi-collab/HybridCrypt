<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload File - HybridCrypt</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #001f2d, #002f47);
      font-family: 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #d0f0fd;
    }

    .upload-box {
      background: rgba(0, 30, 50, 0.95);
      padding: 3rem 2.5rem;
      border-radius: 20px;
      box-shadow: 0 0 25px #00ffa8;
      width: 90%;
      max-width: 480px;
      text-align: center;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      margin-bottom: 0.8rem;
      color: #00ffa8;
      text-shadow: 0 0 12px #00ffa8;
    }

    .subtitle {
      font-size: 1rem;
      margin-bottom: 1.2rem;
      color: #a0eaff;
    }

    form input[type="file"] {
      margin: 1rem 0;
      padding: 0.6rem;
      width: 100%;
      border: 2px dashed #00ffa8;
      background: rgba(0, 255, 168, 0.05);
      color: #a0eaff;
      border-radius: 12px;
      cursor: pointer;
    }

    form input[type="submit"] {
      background: linear-gradient(90deg, #00ffa8, #007f5f);
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 25px;
      font-weight: bold;
      color: #002f47;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 0 18px #00ffa8;
      transition: background 0.3s ease, transform 0.2s;
      margin-top: 1rem;
    }

    form input[type="submit"]:hover {
      background: linear-gradient(90deg, #007f5f, #00ffa8);
      transform: scale(1.05);
    }

    a {
      display: block;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #a0eaff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      color: #00ffa8;
    }

    .footer-note {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #66c5ff;
      opacity: 0.8;
    }

    .flash {
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
    }

    .flash.success {
      background-color: #003f2f;
      color: #00ffa8;
      border: 1px solid #00ffa8;
    }

    .flash.warning {
      background-color: #4f3b1b;
      color: #ffcc00;
      border: 1px solid #ffcc00;
    }

    .flash.danger {
      background-color: #4b1c1c;
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
    }

    .flash.info {
      background-color: #1c3f50;
      color: #66c5ff;
      border: 1px solid #66c5ff;
    }
  </style>
</head>
<body>

  <div class="upload-box">
    <h2>Upload Your File</h2>
    <p class="subtitle">Welcome, {{ username }} ({{ role }})</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- File Upload Form -->
    <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required />
      <input type="submit" value="Encrypt & Upload" />
    </form>

    <a href="{{ url_for('index') }}">← Back to Home</a>
    <a href="{{ url_for('logout') }}">Logout</a>
    <p class="footer-note">© 2025 HybridCrypt. All Rights Reserved.</p>
  </div>

</body>
</html>
